<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비회원 주문조회 — VARO</title>
  <link rel="stylesheet" href="./styles/reset.css">
  <link rel="stylesheet" href="./styles/variables.css">
  <link rel="stylesheet" href="./styles/main.css">
  <link rel="stylesheet" href="./styles/header.css">
  <link rel="stylesheet" href="./styles/components.css">
  <link rel="stylesheet" href="./styles/order-lookup.css">
</head>

<body class="page-order-lookup">

  <div id="header-placeholder"></div>
  <div id="overlay-placeholder"></div>

  <main class="container">
    <div class="lookup-container">
      <h1 class="lookup-title">비회원 주문조회</h1>
      <p class="lookup-desc">주문 시 발급된 주문번호와 비밀번호를 입력해주세요.</p>

      <form id="orderLookupForm">
        <div class="form-group">
          <label for="orderNumber">주문번호</label>
          <input type="text" id="orderNumber" placeholder="예: 20260425-0001" required>
        </div>
        <div class="form-group">
          <label for="orderPassword">주문 비밀번호</label>
          <input type="password" id="orderPassword" placeholder="설정한 비밀번호 입력" required>
        </div>
        <button type="submit" class="btn btn--primary btn--full btn--lg lookup-btn-margin">조회하기</button>
      </form>

      <div id="lookupResult" class="result-box">
        <h3 class="result-title">조회 결과</h3>
        <div class="result-row">
          <span class="result-row__label">주문상태</span>
          <span class="result-row__value result-accent" id="res-status">-</span>
        </div>
        <div class="result-row">
          <span class="result-row__label">상품명</span>
          <span class="result-row__value" id="res-name">-</span>
        </div>
        <div class="result-row">
          <span class="result-row__label">결제금액</span>
          <span class="result-row__value" id="res-amount">-</span>
        </div>
        <div class="result-row">
          <span class="result-row__label">배송지</span>
          <span class="result-row__value" id="res-address">-</span>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="./js/components.js"></script>
  <script src="./js/order-lookup.js"></script>
</body>

</html>
