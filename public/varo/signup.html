<!DOCTYPE html>
<html lang="ko">

<head>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23000000' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z'/><line x1='3' y1='6' x2='21' y2='6'/><path d='M16 10a4 4 0 0 1-8 0'/></svg>">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="VARO 회원가입 — 커뮤니티 멤버가 되어 특별한 혜택을 누리세요.">
  <meta name="theme-color" content="#0D0D0D">
  <title>VARO — 회원가입</title>
  <script src="./js/components.js"></script>

  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">

  <link rel="stylesheet" href="./styles/reset.css">
  <link rel="stylesheet" href="./styles/variables.css">
  <link rel="stylesheet" href="./styles/main.css">
  <link rel="stylesheet" href="./styles/header.css">
  <link rel="stylesheet" href="./styles/mega-menu.css">
  <link rel="stylesheet" href="./styles/modal.css">
  <link rel="stylesheet" href="./styles/components.css">
  <link rel="stylesheet" href="./styles/auth_extra.css">
  <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js" defer></script>
</head>

<body class="auth-body">

  <div id="header-placeholder" data-path="./includes/header.html"></div>
  <div id="overlay-placeholder" data-path="./includes/overlays.html"></div>

  <main id="main-content" class="auth-main">
    <div class="auth-container">

      <div class="auth-card auth-card--signup">

        <div class="auth-card__header">
          <h1 class="auth-title">회원가입</h1>
          <p class="auth-subtitle">가입하고 VARO 커뮤니티 멤버만의 혜택을 누리세요</p>
        </div>

        <!-- 소셜 가입 -->
        <div class="social-login">
          <button class="social-btn social-btn--kakao" type="button" aria-label="카카오 계정으로 가입"
            onclick="openSocialModal('카카오')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path
                d="M12 3C6.48 3 2 6.48 2 10.8c0 2.73 1.64 5.13 4.12 6.6-.16.58-.58 2.07-.67 2.39-.1.38.14.37.29.27.12-.08 1.88-1.24 2.64-1.75.49.07.98.09 1.62.09 5.52 0 10-3.48 10-7.8S17.52 3 12 3z" />
            </svg>
            카카오로 가입하기
          </button>
          <button class="social-btn social-btn--naver" type="button" aria-label="네이버 계정으로 가입"
            onclick="openSocialModal('네이버')">
            <span class="naver-n" aria-hidden="true">N</span>
            네이버로 가입하기
          </button>
          <button class="social-btn social-btn--google" type="button" aria-label="구글 계정으로 로그인"
            onclick="openSocialModal('Google')">
            <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
              <path fill="#4285F4"
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
              <path fill="#34A853"
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
              <path fill="#FBBC05"
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
              <path fill="#EA4335"
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
            </svg>
            Google로 가입하기
          </button>
        </div>

        <div class="auth-divider"><span>또는 이메일로 가입</span></div>

        <!-- 회원가입 폼 -->
        <form class="auth-form" id="signupForm" novalidate>

          <!-- 이름 -->
          <div class="form-group" id="nameGroup">
            <label class="form-label" for="signupName">이름</label>
            <input type="text" class="form-input" id="signupName" name="name" placeholder="이름을 입력해주세요"
              autocomplete="name" maxlength="50" aria-describedby="nameError" aria-required="true">
            <p class="form-error" id="nameError" role="alert" aria-live="polite"></p>
          </div>

          <!-- 이메일 -->
          <div class="form-group" id="emailGroup">
            <label class="form-label" for="signupEmail">이메일</label>
            <input type="email" class="form-input" id="signupEmail" name="email" placeholder="varo@example.com"
              autocomplete="email" maxlength="254" aria-describedby="signupEmailError" aria-required="true">
            <p class="form-error" id="signupEmailError" role="alert" aria-live="polite"></p>
          </div>

          <!-- 비밀번호 -->
          <div class="form-group" id="pwGroup">
            <label class="form-label" for="signupPw">비밀번호</label>
            <div class="form-input-wrap">
              <input type="password" class="form-input" id="signupPw" name="password" placeholder="8자 이상, 영문+숫자+특수문자"
                autocomplete="new-password" maxlength="128" aria-describedby="pwError pwStrength" aria-required="true">
              <button type="button" class="pw-toggle" data-target="signupPw" aria-label="비밀번호 표시/숨기기">
                <svg class="eye-on" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="1.8" aria-hidden="true">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
                <svg class="eye-off u-hidden" width="18" height="18" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                  <path
                    d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                  <line x1="1" y1="1" x2="23" y2="23" />
                </svg>
              </button>
            </div>
            <!-- 비밀번호 강도 표시기 -->
            <div class="pw-strength" id="pwStrength" aria-live="polite">
              <div class="pw-strength__bar">
                <span class="pw-strength__seg" data-seg="0"></span>
                <span class="pw-strength__seg" data-seg="1"></span>
                <span class="pw-strength__seg" data-seg="2"></span>
                <span class="pw-strength__seg" data-seg="3"></span>
              </div>
              <span class="pw-strength__label" id="pwStrengthLabel"></span>
            </div>
            <p class="form-error" id="pwError" role="alert" aria-live="polite"></p>
          </div>

          <!-- 비밀번호 확인 -->
          <div class="form-group" id="pwConfirmGroup">
            <label class="form-label" for="signupPwConfirm">비밀번호 확인</label>
            <div class="form-input-wrap">
              <input type="password" class="form-input" id="signupPwConfirm" name="passwordConfirm"
                placeholder="비밀번호 재입력" autocomplete="new-password" maxlength="128" aria-describedby="pwConfirmError"
                aria-required="true">
              <button type="button" class="pw-toggle" data-target="signupPwConfirm" aria-label="비밀번호 확인 표시/숨기기">
                <svg class="eye-on" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="1.8" aria-hidden="true">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
                <svg class="eye-off u-hidden" width="18" height="18" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                  <path
                    d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                  <line x1="1" y1="1" x2="23" y2="23" />
                </svg>
              </button>
            </div>
            <p class="form-error" id="pwConfirmError" role="alert" aria-live="polite"></p>
          </div>

          <!-- 주소 (하이브리드 모드 시연) -->
          <div class="form-group" id="addressGroup">
            <label class="form-label">주소</label>
            <div class="input-with-btn">
              <input type="text" class="form-input" id="signupZipcode" name="zipcode" placeholder="우편번호" readonly>
              <button type="button" class="btn--search" id="signupAddrSearch">주소 검색</button>
            </div>
            <input type="text" class="form-input" id="signupAddress" name="address" placeholder="기본 주소" readonly
              style="margin-top: 8px;">
            <input type="text" class="form-input" id="signupAddressDetail" name="addressDetail" placeholder="상세 주소"
              style="margin-top: 8px;">
          </div>

          <!-- 약관 동의 -->
          <div class="terms-wrap" id="termsWrap">
            <label class="form-check terms-all">
              <input type="checkbox" id="termsAll" name="termsAll">
              <span><strong>전체 동의</strong></span>
            </label>
            <div class="terms-list">
              <label class="form-check">
                <input type="checkbox" id="terms1" name="terms1" required aria-required="true">
                <span>[필수] 이용약관 동의</span>
                <a href="javascript:void(0)" class="terms-detail" data-term="service" aria-label="이용약관 상세 보기">보기</a>
              </label>
              <label class="form-check">
                <input type="checkbox" id="terms2" name="terms2" required aria-required="true">
                <span>[필수] 개인정보처리방침 동의</span>
                <a href="javascript:void(0)" class="terms-detail" data-term="privacy" aria-label="개인정보처리방침 상세 보기">보기</a>
              </label>
              <label class="form-check">
                <input type="checkbox" id="terms3" name="terms3">
                <span>[선택] 마케팅 정보 수신 동의</span>
              </label>
            </div>
            <p class="form-error" id="termsError" role="alert" aria-live="polite"></p>
            <p class="form-error u-mb-15" id="signupGeneralError" role="alert" aria-live="polite"
              style="text-align: center; font-weight: 500;"></p>

            <button type="submit" class="btn btn--primary btn--full" id="signupSubmit">
              가입하기
            </button>

        </form>

        <div class="auth-card__footer">
          <p>이미 회원이신가요? <a href="./login.html" class="auth-link">로그인</a></p>
        </div>

      </div>

    </div>
  </main>

  <div id="footer-placeholder"></div>

  <div class="toast-container" id="toastContainer" aria-live="polite" aria-atomic="true"></div>

  <!-- 약관 모달 -->
  <div class="varo-modal" id="termsModal" aria-hidden="true" role="dialog">
    <div class="varo-modal__overlay"></div>
    <div class="varo-modal__content">
      <div class="varo-modal__header">
        <h2 class="varo-modal__title">이용 약관</h2>
        <button type="button" class="varo-modal__close" aria-label="닫기">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6 6 18M6 6l12 12" />
          </svg>
        </button>
      </div>
      <div class="varo-modal__body" id="termsModalBody">
        <!-- 약관 내용 동적 삽입 -->
      </div>
    </div>
  </div>

  <!-- Social Login Simulation Modal -->
  <div id="socialLoginModal" class="modal-overlay u-hidden" role="dialog" aria-modal="true">
    <div class="modal-content social-modal-content">
      <div id="socialModalLogo" class="social-modal-logo"></div>
      <p id="socialModalText" class="social-modal-text"></p>
      <div class="social-spinner" id="socialSpinner"></div>
      <button type="button" class="btn btn--primary btn--full" id="btnSocialConfirm">동의하고 계속하기</button>
      <button type="button" class="btn btn--outline btn--full" style="margin-top: 10px;"
        onclick="closeSocialModal()">취소</button>
    </div>
  </div>

  <script src="./js/risk-mitigation.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/data.js"></script>
  <script type="module" src="./js/utils.js"></script>
  <script type="module" src="./js/main.js"></script>
  <script type="module" src="./js/auth.js"></script>
  <script src="./js/mega-menu.js"></script>

</body>

</html>
