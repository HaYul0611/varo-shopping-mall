<!DOCTYPE html>
<html lang="ko">

<head>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛍️</text></svg>">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="VARO 로그인 — 나만의 스타일 커뮤니티에 참여하세요.">
  <meta name="theme-color" content="#0D0D0D">
  <title>VARO — 로그인</title>
  <script src="./js/components.js"></script>

  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">

  <link rel="stylesheet" href="./styles/reset.css">
  <link rel="stylesheet" href="./styles/variables.css">
  <link rel="stylesheet" href="./styles/mega-menu.css">
  <link rel="stylesheet" href="./styles/main.css">
  <link rel="stylesheet" href="./styles/header.css">
  <link rel="stylesheet" href="./styles/components.css">
  <link rel="stylesheet" href="./styles/auth_extra.css">
</head>

<body class="auth-body">

  <div id="header-placeholder"></div>

  <div id="overlay-placeholder"></div>

  <main id="main-content" class="auth-main">
    <div class="auth-container">

      <div class="auth-card">

        <div class="auth-card__header">
          <h1 class="auth-title">로그인</h1>
          <p class="auth-subtitle">VARO 멤버만의 특별한 혜택을 누리세요</p>
        </div>

        <!-- 소셜 로그인 -->
        <div class="social-login">
          <button class="social-btn social-btn--kakao" type="button" aria-label="카카오 계정으로 로그인">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path
                d="M12 3C6.48 3 2 6.48 2 10.8c0 2.73 1.64 5.13 4.12 6.6-.16.58-.58 2.07-.67 2.39-.1.38.14.37.29.27.12-.08 1.88-1.24 2.64-1.75.49.07.98.09 1.62.09 5.52 0 10-3.48 10-7.8S17.52 3 12 3z" />
            </svg>
            카카오로 시작하기
          </button>
          <button class="social-btn social-btn--naver" type="button" aria-label="네이버 계정으로 로그인">
            <span class="naver-n" aria-hidden="true">N</span>
            네이버로 시작하기
          </button>
          <button class="social-btn social-btn--google" type="button" aria-label="구글 계정으로 로그인">
            <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
              <path fill="#4285F4"
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
              <path fill="#34A853"
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
              <path fill="#FBBC05"
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
              <path fill="#EA4335"
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
            </svg>
            Google로 시작하기
          </button>
        </div>

        <div class="auth-divider"><span>또는 이메일로 로그인</span></div>

        <!-- 로그인 폼 -->
        <form class="auth-form" id="loginForm" novalidate>

          <div class="form-group" id="emailGroup">
            <label class="form-label" for="loginEmail">이메일</label>
            <input type="email" class="form-input" id="loginEmail" name="email" placeholder="varo@example.com"
              autocomplete="email" maxlength="254" aria-describedby="emailError" aria-required="true">
            <p class="form-error" id="emailError" role="alert" aria-live="polite"></p>
          </div>

          <div class="form-group" id="passwordGroup">
            <div class="form-label-row">
              <label class="form-label" for="loginPassword">비밀번호</label>
            </div>
            <div class="form-input-wrap">
              <input type="password" class="form-input" id="loginPassword" name="password" placeholder="비밀번호 입력"
                autocomplete="current-password" maxlength="128" aria-describedby="passwordError" aria-required="true">
              <button type="button" class="pw-toggle" data-target="loginPassword" aria-label="비밀번호 표시/숨기기">
                <svg class="eye-on" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="1.8" aria-hidden="true">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
                <svg class="eye-off u-hidden" width="18" height="18" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                  <path
                    d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                  <line x1="1" y1="1" x2="23" y2="23" />
                </svg>
              </button>
            </div>
            <p class="form-error" id="passwordError" role="alert" aria-live="polite"></p>
          </div>

          <div class="auth-options">
            <label class="toggle-switch">
              <input type="checkbox" id="loginRemember" name="remember">
              <span class="toggle-slider"></span>
              <span class="toggle-label">로그인 상태 유지</span>
            </label>
            <div class="auth-helper-links">
              <a href="javascript:void(0)" class="auth-helper-link" onclick="openFindAccount('id')">아이디 찾기</a>
              <span class="auth-helper-sep"></span>
              <a href="javascript:void(0)" class="auth-helper-link" onclick="openFindAccount('pw')">비밀번호 찾기</a>
            </div>
          </div>

          <button type="submit" class="btn btn--primary btn--full" id="loginSubmit">
            로그인
          </button>

        </form>

        <div class="auth-card__footer">
          <p>아직 회원이 아닌가요? <a href="./signup.html" class="auth-link">회원가입</a></p>
          <p style="margin-top: 10px;"><a href="./order-lookup.html" class="auth-link"
              style="color: var(--color-text-muted);">비회원 주문조회</a></p>
        </div>

      </div>

    </div>
  </main>

  <div id="footer-placeholder"></div>

  <div class="toast-container" id="toastContainer" aria-live="polite" aria-atomic="true"></div>

  <script src="./js/api.js"></script>
  <script src="./js/data.js"></script>
  <script src="./js/guestManager.js"></script>
  <script src="./js/auth.js"></script>
  <script type="module" src="./js/utils.js"></script>
  <script type="module" src="./js/main.js"></script>
  <script src="./js/mega-menu.js"></script>
  <script src="./js/find-account.js"></script>

  <!-- Find Account Modal -->
  <div id="findAccountModal" class="modal-overlay u-hidden" role="dialog" aria-modal="true">
    <div class="modal-content find-modal">
      <button type="button" class="modal-close" onclick="closeFindAccount()" aria-label="닫기">&times;</button>

      <div id="findTabNav" class="find-tabs">
        <button type="button" class="find-tab active" data-tab="id" onclick="switchFindTab('id')">아이디 찾기</button>
        <button type="button" class="find-tab" data-tab="pw" onclick="switchFindTab('pw')">비밀번호 찾기</button>
      </div>

      <div class="find-body">
        <!-- Find ID Section -->
        <div id="findIdSection" class="find-section">
          <p class="find-desc">가입하실 때 입력하신 이름과 이메일을 입력해 주세요.</p>
          <div class="form-group u-mb-20">
            <input type="text" id="findIdName" class="form-input" placeholder="이름">
          </div>
          <div class="form-group u-mb-30">
            <input type="email" id="findIdEmail" class="form-input" placeholder="이메일 주소">
          </div>
          <button type="button" class="btn btn--primary btn--full" onclick="handleFindId()">아이디 찾기</button>
          <div id="findIdResult" class="find-result u-hidden"></div>
        </div>

        <!-- Find PW Section -->
        <div id="findPwSection" class="find-section u-hidden">
          <p class="find-desc">가입하신 이메일 주소로 인증번호를 발송해 드립니다.</p>

          <div id="pwStage1">
            <div class="form-group u-mb-30">
              <input type="email" id="findPwEmail" class="form-input" placeholder="이메일 주소">
            </div>
            <button type="button" class="btn btn--primary btn--full" onclick="handleRequestCode()">인증번호 요청</button>
          </div>

          <div id="pwStage2" class="u-hidden">
            <div class="form-group u-mb-30">
              <div class="input-with-timer">
                <input type="text" id="findPwCode" class="form-input" placeholder="인증번호 6자리">
                <span id="authTimer" class="auth-timer">05:00</span>
              </div>
            </div>
            <button type="button" class="btn btn--primary btn--full" onclick="handleVerifyCode()">인증번호 확인</button>
          </div>

          <div id="pwStage3" class="u-hidden">
            <div class="form-group u-mb-15">
              <input type="password" id="newPassword" class="form-input" placeholder="새 비밀번호">
            </div>
            <div class="form-group u-mb-30">
              <input type="password" id="newPasswordConfirm" class="form-input" placeholder="새 비밀번호 확인">
            </div>
            <button type="button" class="btn btn--primary btn--full" onclick="handleResetPassword()">비밀번호 변경</button>
          </div>
        </div>
      </div>
    </div>
  </div>

</body>

</html>
