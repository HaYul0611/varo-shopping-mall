<!DOCTYPE html>
<html lang="ko">

<head>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛍️</text></svg>">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VARO — 마이페이지</title>
  <script src="./js/components.js"></script>

  <!-- 보안 및 인증 체크: 로그인 안 되어 있으면 로그인 페이지로 리다이렉트 -->
  <script>
    (function () {
      const user = localStorage.getItem('varo_user');
      if (!user) {
        alert('로그인이 필요한 페이지입니다. 로그인 페이지로 이동합니다.');
        location.replace('./login.html');
      }
    })();
  </script>

  <!-- CSS -->
  <link rel="stylesheet" href="./styles/reset.css">
  <link rel="stylesheet" href="./styles/variables.css">
  <link rel="stylesheet" href="./styles/main.css">
  <link rel="stylesheet" href="./styles/header.css">
  <link rel="stylesheet" href="./styles/mega-menu.css">
  <link rel="stylesheet" href="./styles/mypage.css">
</head>

<body class="mypage-page">

  <div id="header-placeholder"></div>

  <div id="overlay-placeholder"></div>

  <main class="main-content">
    <div class="container">
      <div class="mypage-layout">
        <!-- 좌측: 사이드 메뉴 -->
        <aside class="mypage-sidebar">
          <div class="user-brief">
            <div class="user-avatar">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
              </svg>
            </div>
            <div class="user-info">
              <span class="user-name" id="userNameLabel">사용자</span>님
              <span class="user-grade">GOLD MEMBER</span>
            </div>
          </div>

          <nav class="mypage-nav">
            <ul class="mypage-nav__list">
              <li><a href="#" class="mypage-nav__link is-active">주문내역</a></li>
              <li><a href="#" class="mypage-nav__link">위시리스트</a></li>
              <li><a href="#" class="mypage-nav__link">프로필 수정</a></li>
              <li><a href="#" id="btnLogout" class="mypage-nav__link mypage-nav__link--logout">로그아웃</a></li>
            </ul>
          </nav>
        </aside>

        <!-- 우측: 메인 콘텐츠 -->
        <div class="mypage-content">
          <section class="mypage-section">
            <h2 class="mypage-section__title">주문 내역</h2>

            <div class="order-table-wrapper">
              <table class="order-table">
                <thead>
                  <tr>
                    <th>주문일자</th>
                    <th>상품 정보</th>
                    <th>주문 금액</th>
                    <th>진행 상태</th>
                  </tr>
                </thead>
                <tbody id="orderHistoryList">
                  <!-- 데이터가 없을 때 -->
                  <tr>
                    <td colspan="4" class="empty-row">최근 주문 내역이 없습니다.</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </section>
        </div>
      </div>
  </main>

  <div id="footer-placeholder"></div>

  <!-- 스크립트 -->
  <script src="./js/data.js"></script>
  <script src="./js/utils.js"></script>
  <script src="./js/main.js"></script>
  <script src="./js/mega-menu.js"></script>
  <script src="./js/mypage.js"></script>
</body>

</html>
