<!DOCTYPE html>
<html lang="ko">

<head>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛍️</text></svg>">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="VARO 쇼핑 — 최신 남성 패션 컬렉션을 만나보세요.">
  <meta name="theme-color" content="#0D0D0D">
  <title>VARO — SHOP</title>
  <script src="./js/components.js"></script>

  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">

  <link rel="stylesheet" href="./styles/reset.css">
  <link rel="stylesheet" href="./styles/variables.css">
  <link rel="stylesheet" href="./styles/main.css">
  <link rel="stylesheet" href="./styles/header.css">
  <link rel="stylesheet" href="./styles/mega-menu.css">
  <link rel="stylesheet" href="./styles/shop.css">
</head>

<body>

  <div id="header-placeholder"></div>

  <div id="overlay-placeholder"></div>

  <main id="main-content">

    <!-- ── SHOP HEADER ─────────────────────────── -->
    <div class="shop-header container">
      <div class="shop-header__top">
        <nav class="breadcrumb" aria-label="페이지 경로">
          <a href="./index.html">홈</a>
          <span aria-hidden="true">/</span>
          <span id="breadcrumbCurrent">전체</span>
        </nav>
        <h1 class="shop-header__title" id="shopTitle">ALL ITEMS</h1>
        <p class="shop-header__count" id="shopCount">0개의 상품</p>
      </div>

      <!-- 카테고리 필터 탭 -->
      <div class="filter-tabs" role="tablist" aria-label="카테고리 필터" id="filterTabs">
        <button class="filter-tab is-active" role="tab" aria-selected="true" data-category="all">전체</button>
        <button class="filter-tab" role="tab" aria-selected="false" data-category="outer">아우터</button>
        <button class="filter-tab" role="tab" aria-selected="false" data-category="top">상의</button>
        <button class="filter-tab" role="tab" aria-selected="false" data-category="bottom">하의</button>
        <button class="filter-tab" role="tab" aria-selected="false" data-category="acc">악세서리</button>
      </div>

      <!-- 정렬 + 뷰 토글 -->
      <div class="shop-toolbar">
        <div class="toolbar-left"></div>
        <div class="toolbar-right">
          <div class="page-size-wrap">
            <select class="sort-select" id="pageSizeSelect" aria-label="페이지당 상품 수">
              <option value="20">20개씩 보기</option>
              <option value="40">40개씩 보기</option>
              <option value="60">60개씩 보기</option>
            </select>
          </div>
          <div class="sort-wrap">
            <label for="sortSelect" class="sr-only">정렬 기준</label>
            <select class="sort-select" id="sortSelect" aria-label="상품 정렬">
              <option value="newest">최신순</option>
              <option value="price-low">낮은 가격순</option>
              <option value="price-high">높은 가격순</option>
              <option value="popular">인기순</option>
            </select>
          </div>
          <div class="view-toggle" role="group" aria-label="보기 방식">
            <button class="view-btn is-active" id="viewGrid" aria-pressed="true" aria-label="격자 보기">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                <rect x="0" y="0" width="7" height="7" />
                <rect x="9" y="0" width="7" height="7" />
                <rect x="0" y="9" width="7" height="7" />
                <rect x="9" y="9" width="7" height="7" />
              </svg>
            </button>
            <button class="view-btn" id="viewList" aria-pressed="false" aria-label="목록 보기">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                <rect x="0" y="0" width="16" height="4" />
                <rect x="0" y="6" width="16" height="4" />
                <rect x="0" y="12" width="16" height="4" />
              </svg>
            </button>
          </div>
        </div>
      </div>

      <!-- ── SHOP BODY ────────────────────────────── -->
      <div class="shop-body container">

        <!-- 사이드 필터 (데스크탑) -->
        <aside class="side-filter" aria-label="상세 필터">
          <div class="side-filter__section">
            <p class="side-filter__title">가격대</p>
            <ul class="side-filter__list">
              <li><label><input type="checkbox" name="price" value="under50"> 5만원 이하</label></li>
              <li><label><input type="checkbox" name="price" value="50to100"> 5~10만원</label></li>
              <li><label><input type="checkbox" name="price" value="100to200"> 10~20만원</label></li>
              <li><label><input type="checkbox" name="price" value="over200"> 20만원 이상</label></li>
            </ul>
            <div class="price-manual">
              <input type="number" id="minPrice" placeholder="최소 금액" class="price-input">
              <span>~</span>
              <input type="number" id="maxPrice" placeholder="최대 금액" class="price-input">
              <button id="applyPrice" class="price-apply-btn">적용</button>
            </div>
          </div>

          <div class="side-filter__section">
            <p class="side-filter__title">사이즈</p>
            <div class="side-filter__sizes" id="sizeFilterList">
              <button class="size-chip" data-size="XS">XS</button>
              <button class="size-chip" data-size="S">S</button>
              <button class="size-chip" data-size="M">M</button>
              <button class="size-chip" data-size="L">L</button>
              <button class="size-chip" data-size="XL">XL</button>
              <button class="size-chip" data-size="XXL">XXL</button>
            </div>
          </div>
        </aside>

        <!-- 상품 그리드 -->
        <div class="shop-main">
          <div class="product-grid" id="shopGrid">
            <!-- 스켈레톤 로딩 -->
            <div class="skeleton skeleton--card"></div>
            <div class="skeleton skeleton--card"></div>
            <div class="skeleton skeleton--card"></div>
            <div class="skeleton skeleton--card"></div>
            <div class="skeleton skeleton--card"></div>
            <div class="skeleton skeleton--card"></div>
          </div>

          <!-- 빈 상태 -->
          <div class="shop-empty" id="shopEmpty" hidden>
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"
              aria-hidden="true">
              <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" />
              <line x1="3" y1="6" x2="21" y2="6" />
              <path d="M16 10a4 4 0 0 1-8 0" />
            </svg>
            <p>조건에 맞는 상품이 없습니다.</p>
            <button class="btn btn--outline" id="resetFilter">필터 초기화</button>
          </div>

          <!-- 페이지네이션 -->
          <nav class="pagination" id="pagination" aria-label="페이지 이동">
            <!-- JS로 채워짐 -->
          </nav>
        </div>
      </div>

  </main>

  <div id="footer-placeholder"></div>

  <script src="./js/data.js"></script>
  <script src="./js/utils.js"></script>
  <script src="./js/main.js"></script>
  <script src="./js/shop.js"></script>
  <script src="./js/mega-menu.js"></script>

</body>

</html>
