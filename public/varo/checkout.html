<!DOCTYPE html>
<html lang="ko">

<head>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛍️</text></svg>">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VARO — 주문/결제</title>
  <script src="./js/components.js"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="./styles/reset.css">
  <link rel="stylesheet" href="./styles/variables.css">
  <link rel="stylesheet" href="./styles/main.css">
  <link rel="stylesheet" href="./styles/header.css">
  <link rel="stylesheet" href="./styles/mega-menu.css">
  <link rel="stylesheet" href="./styles/checkout.css">
</head>

<body class="checkout-page">

  <div id="header-placeholder"></div>

  <div id="overlay-placeholder"></div>

  <main class="main-content">
    <div class="container">
      <h1 class="page-title">ORDER / CHECKOUT</h1>

      <div class="checkout-layout">
        <!-- 좌측: 주문 폼 -->
        <div class="checkout-layout__form">
          <section class="checkout-section">
            <h2 class="checkout-section__title">배송지 정보</h2>
            <div class="form-group-list">
              <div class="form-row">
                <div class="form-group">
                  <label for="orderName" class="form-label">수령인 *</label>
                  <input type="text" id="orderName" class="form-input" placeholder="이름을 입력해 주세요.">
                </div>
                <div class="form-group">
                  <label for="orderTel" class="form-label">연락처 *</label>
                  <input type="tel" id="orderTel" class="form-input" placeholder="010-0000-0000">
                </div>
              </div>
              <div class="form-group">
                <label for="orderAddr" class="form-label">주소 *</label>
                <div class="input-with-btn">
                  <input type="text" id="orderAddr" class="form-input" placeholder="우편번호 찾기" readonly>
                  <button type="button" class="btn btn--secondary">주소찾기</button>
                </div>
                <input type="text" id="orderAddrBase" class="form-input mt-2" placeholder="기본 주소" readonly>
                <input type="text" id="orderAddrDetail" class="form-input mt-2" placeholder="상세 주소를 입력해 주세요.">
              </div>
              <div class="form-group">
                <label for="orderMemo" class="form-label">배송 메모</label>
                <select id="orderMemo" class="form-input">
                  <option value="">배송 메모를 선택해 주세요.</option>
                  <option value="1">부재 시 문 앞에 놓아주세요.</option>
                  <option value="2">배송 전 미리 연락 바랍니다.</option>
                  <option value="3">직접 가입력</option>
                </select>
                <textarea id="orderMemoCustom" class="form-input mt-2 u-hidden"
                  placeholder="직접 입력 내용을 기입해 주세요."></textarea>
              </div>
            </div>
          </section>

          <section class="checkout-section mt-10">
            <h2 class="checkout-section__title">결제 수단</h2>
            <div class="payment-methods">
              <label class="payment-option">
                <input type="radio" name="payment" value="card" checked>
                <span class="payment-option__box">신용/체크카드</span>
              </label>
              <label class="payment-option">
                <input type="radio" name="payment" value="kakao">
                <span class="payment-option__box">카카오페이</span>
              </label>
              <label class="payment-option">
                <input type="radio" name="payment" value="naver">
                <span class="payment-option__box">네이버페이</span>
              </label>
              <label class="payment-option">
                <input type="radio" name="payment" value="bank">
                <span class="payment-option__box">무통장 입금</span>
              </label>
            </div>
          </section>
        </div>

        <!-- 우측: 주문 요약 -->
        <aside class="checkout-layout__summary">
          <div class="summary-card">
            <h2 class="summary-card__title">주문 요약</h2>

            <div id="orderItemsList" class="order-items-mini">
              <!-- JS에서 렌더링 -->
              <p class="empty-msg">주문할 상품이 없습니다.</p>
            </div>

            <div class="summary-details">
              <div class="summary-row">
                <span>총 상품금액</span>
                <span id="totalProductPrice">0원</span>
              </div>
              <div class="summary-row">
                <span>배송비</span>
                <span id="shippingFee">0원</span>
              </div>
              <div class="summary-row summary-row--total">
                <span>최종 결제금액</span>
                <span id="finalOrderPrice">0원</span>
              </div>
            </div>

            <div class="agreement-section">
              <label class="checkbox-group all-agree">
                <input type="checkbox" id="agreeAll">
                <span class="checkbox-label">주문내용 확인 및 결제 동의 (전체)</span>
              </label>
              <div class="agreement-sub">
                <label class="checkbox-group">
                  <input type="checkbox" class="agree-item" id="agreeTerms">
                  <span class="checkbox-label">[필수] 이용약관 동의</span>
                </label>
                <label class="checkbox-group">
                  <input type="checkbox" class="agree-item" id="agreePrivacy">
                  <span class="checkbox-label">[필수] 개인정보 수집 및 이용 동의</span>
                </label>
              </div>
            </div>

            <button type="button" class="btn btn--accent btn--full btn--large mt-6" id="btnPay">
              <span id="payAmount">0원</span> 결제하기
            </button>
          </div>
        </aside>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <!-- 스크립트 -->
  <script src="./js/api.js"></script>
  <script src="./js/data.js"></script>
  <script src="./js/utils.js"></script>
  <script src="./js/main.js"></script>
  <script src="./js/mega-menu.js"></script>
  <script type="module" src="./js/checkout.js"></script>
</body>

</html>
